# Build the web app and publish it to GitHub Pages.
# Pages serves a project site from https://<user>.github.io/<repo>/, a subpath,
# so we build with VITE_BASE=/<repo>/ so asset URLs resolve correctly.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Permissions the Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install the whole workspace from the repo root (the web app consumes
      # @fasttarot/core as raw TS from packages/core).
      - name: Install
        run: npm ci

      - name: Build
        env:
          # Serve under /<repo>/. If you rename the repo, update this.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run web:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
